<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RETRO SHOOTER</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="hud">
      <div id="hud-top">
        <span id="hud-level">LVL 1</span>
        <span id="hud-enemies">ENEMIES: 0</span>
        <span id="hud-score">SCORE: 0</span>
      </div>
      <div id="hud-bottom">
        <div id="hud-health-wrap">
          <label id="hp-label">HP</label>
          <div id="hud-hp-bar-bg">
            <div id="hud-hp-bar"></div>
          </div>
          <span id="hud-hp-text">100/100</span>
        </div>
        <div id="hud-weapon-wrap">
          <div id="hud-weapon-slots">
            <div class="weapon-slot active" id="slot-0">PIST</div>
            <div class="weapon-slot" id="slot-1">---</div>
            <div class="weapon-slot" id="slot-2">---</div>
          </div>
          <div id="hud-ammo">12 / 48</div>
          <div id="hud-weapon-name">PISTOL</div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
